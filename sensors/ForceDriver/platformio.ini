; Placa: Seeed Studio XIAO ESP32S3 (antena externa U.FL obrigatória).
; O manifesto da placa já define ARDUINO_USB_MODE=1 e ARDUINO_USB_CDC_ON_BOOT=1.
; upload/monitor usam o caminho /dev/serial/by-id (o /dev/ttyACMx muda a cada
; replug). Se a gravação USB não iniciar: segure BOOT, toque RESET, solte BOOT.

; Gravação por USB: pio run -e seeed_xiao_esp32s3 -t upload
[env:seeed_xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
lib_deps = bogde/HX711@^0.7.5
upload_port = /dev/serial/by-id/usb-Espressif_USB_JTAG_serial_debug_unit_CC:BA:97:15:45:34-if00
monitor_port = /dev/serial/by-id/usb-Espressif_USB_JTAG_serial_debug_unit_CC:BA:97:15:45:34-if00
monitor_speed = 115200

; Teste da célula pela serial, sem WiFi/OTA/UDP:
;   pio run -e serial_test -t upload && pio device monitor
[env:serial_test]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
build_flags = -DSERIAL_TEST=1
lib_deps = bogde/HX711@^0.7.5
upload_port = /dev/serial/by-id/usb-Espressif_USB_JTAG_serial_debug_unit_CC:BA:97:15:45:34-if00
monitor_port = /dev/serial/by-id/usb-Espressif_USB_JTAG_serial_debug_unit_CC:BA:97:15:45:34-if00
monitor_speed = 115200

; Gravação OTA (após a 1ª gravação USB): pio run -e ota -t upload
; O IP acompanha o LOCAL_IP do main.cpp (muda com o ambiente de rede).
[env:ota]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
lib_deps = bogde/HX711@^0.7.5
upload_protocol = espota
upload_port = 192.168.5.105
upload_flags =
    --auth=Biolabeb0608
monitor_speed = 115200
